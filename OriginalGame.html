<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Orchard Dash - Senna and Dad's Video Game</title>

    <!-- PWA / iOS Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Orchard Dash" />
    <link rel="apple-touch-icon" href="icon-180.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1a1a2e" />

    <!-- 8-bit pixel font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #1a1a2e;
        font-family: Arial, sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #gameCanvas {
        display: block;
        background-color: #000;
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }

      /* Portrait mode message - 8-bit style */
      #rotateMessage {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        color: white;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
        z-index: 1000;
        font-family: 'Press Start 2P', monospace;
      }

      #rotateMessage .icon {
        font-size: 48px;
        margin-bottom: 24px;
        color: #0ff;
        animation: rotateIcon 2s steps(4) infinite;
      }

      @keyframes rotateIcon {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(22deg); }
        50% { transform: rotate(90deg); }
        75% { transform: rotate(68deg); }
      }

      #rotateMessage h2 {
        font-size: 14px;
        margin-bottom: 16px;
        color: #ffd700;
        text-shadow: 3px 3px 0 #92400e;
        letter-spacing: 2px;
      }

      #rotateMessage p {
        font-size: 10px;
        color: #0f0;
        letter-spacing: 1px;
      }

      #rotateMessage .border-box {
        border: 4px solid #ffd700;
        padding: 32px 24px;
        background: #0a0a0a;
        box-shadow: 0 0 0 4px #000, 0 0 0 8px #92400e;
      }

      @media (orientation: portrait) and (max-width: 768px) {
        #rotateMessage {
          display: flex;
        }
        #gameCanvas {
          display: none;
        }
      }

      /* High Score Input Overlay - 8-bit Retro Style */
      #highScoreOverlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.95);
        justify-content: center;
        align-items: center;
        z-index: 100;
        font-family: 'Press Start 2P', monospace;
        image-rendering: pixelated;
      }

      #highScoreOverlay.visible {
        display: flex;
      }

      .high-score-container {
        background: #000;
        border: 8px solid #ffd700;
        box-shadow:
          0 0 0 4px #000,
          0 0 0 8px #92400e,
          inset 0 0 0 4px #1a1a2e;
        padding: 24px 32px;
        max-width: 480px;
        width: 90%;
        text-align: center;
        color: #fff;
      }

      .high-score-container h1 {
        font-size: 18px;
        margin-bottom: 8px;
        color: #ff0000;
        text-shadow:
          4px 4px 0 #8b0000,
          -1px -1px 0 #000,
          1px -1px 0 #000,
          -1px 1px 0 #000,
          1px 1px 0 #000;
        letter-spacing: 2px;
      }

      .high-score-container .final-score {
        font-size: 32px;
        margin: 16px 0;
        color: #00ff00;
        text-shadow: 4px 4px 0 #006400;
      }

      .high-score-container .level-info {
        font-size: 10px;
        color: #888;
        margin-bottom: 16px;
        letter-spacing: 1px;
      }

      .new-high-score {
        background: #000;
        color: #ffd700;
        padding: 8px 16px;
        border: 4px solid #ffd700;
        font-size: 10px;
        margin-bottom: 16px;
        display: inline-block;
        animation: blink 0.5s step-start infinite;
        letter-spacing: 1px;
      }

      @keyframes blink {
        50% { opacity: 0; }
      }

      .name-input-section {
        margin: 16px 0;
      }

      .name-input-section label {
        display: block;
        margin-bottom: 12px;
        font-size: 10px;
        color: #0ff;
        letter-spacing: 1px;
      }

      .name-input-section input {
        width: 220px;
        padding: 12px 16px;
        font-family: 'Press Start 2P', monospace;
        font-size: 14px;
        border: 4px solid #0ff;
        background: #001a1a;
        color: #0ff;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      .name-input-section input::placeholder {
        color: #066;
      }

      .name-input-section input:focus {
        outline: none;
        border-color: #ffd700;
        color: #ffd700;
        background: #1a1a00;
      }

      .submit-btn, .play-again-btn {
        font-family: 'Press Start 2P', monospace;
        background: #000;
        color: #0f0;
        border: 4px solid #0f0;
        padding: 12px 24px;
        font-size: 10px;
        cursor: pointer;
        margin: 8px;
        letter-spacing: 1px;
        transition: none;
      }

      .submit-btn:hover, .play-again-btn:hover {
        background: #0f0;
        color: #000;
      }

      .submit-btn:active, .play-again-btn:active {
        transform: translate(2px, 2px);
      }

      .submit-btn:disabled {
        border-color: #333;
        color: #333;
        cursor: not-allowed;
      }

      .submit-btn:disabled:hover {
        background: #000;
        color: #333;
      }

      .leaderboard {
        margin-top: 24px;
        text-align: left;
      }

      .leaderboard h2 {
        text-align: center;
        margin-bottom: 12px;
        color: #ffd700;
        font-size: 12px;
        letter-spacing: 2px;
      }

      .leaderboard-list {
        background: #0a0a0a;
        border: 4px solid #333;
        padding: 8px;
        max-height: 200px;
        overflow-y: auto;
      }

      .leaderboard-entry {
        display: flex;
        justify-content: space-between;
        padding: 6px 4px;
        border-bottom: 2px dotted #222;
        font-size: 8px;
        letter-spacing: 1px;
      }

      .leaderboard-entry:last-child {
        border-bottom: none;
      }

      .leaderboard-entry .rank {
        width: 32px;
        color: #ffd700;
      }

      .leaderboard-entry .name {
        flex: 1;
        text-transform: uppercase;
        color: #0ff;
      }

      .leaderboard-entry .score {
        color: #0f0;
        text-align: right;
        min-width: 80px;
      }

      .leaderboard-entry.current-player {
        background: #1a1a00;
        border: 2px solid #ffd700;
      }

      .loading {
        color: #666;
        text-align: center;
        padding: 16px;
        font-size: 8px;
        animation: blink 1s step-start infinite;
      }

      .error {
        color: #f00;
        text-align: center;
        padding: 8px;
        font-size: 8px;
      }
    </style>
  </head>
  <body>
    <!-- Rotate device message -->
    <div id="rotateMessage">
      <div class="border-box">
        <div class="icon">[|]</div>
        <h2>ROTATE DEVICE</h2>
        <p>LANDSCAPE MODE REQUIRED</p>
      </div>
    </div>

    <!-- High Score Overlay -->
    <div id="highScoreOverlay">
      <div class="high-score-container">
        <h1>GAME OVER</h1>
        <div class="final-score" id="finalScore">0</div>
        <div class="level-info" id="levelInfo">LEVEL 1</div>

        <div id="newHighScoreSection" style="display: none;">
          <div class="new-high-score">* NEW HIGH SCORE *</div>
          <div class="name-input-section">
            <label for="playerName">ENTER NAME:</label>
            <input type="text" id="playerName" maxlength="10" placeholder="AAA" autocomplete="off" />
          </div>
          <button class="submit-btn" id="submitScore">SUBMIT</button>
        </div>

        <div class="leaderboard">
          <h2>- HIGH SCORES -</h2>
          <div class="leaderboard-list" id="leaderboardList">
            <div class="loading">LOADING...</div>
          </div>
        </div>

        <button class="play-again-btn" id="playAgainBtn">PLAY AGAIN</button>
      </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      // =====================================================
      // SUPABASE CONFIGURATION
      // =====================================================

      const SUPABASE_URL = 'https://uopifdvhmqfignfffqms.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable_Ml2kp7O6Wog8g9-EJLqR8A_G_RR6I97';

      let supabaseClient;
      try {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      } catch (e) {
        console.error('Failed to initialize Supabase:', e);
      }

      // =====================================================
      // HIGH SCORE FUNCTIONS
      // =====================================================

      async function fetchHighScores() {
        if (!supabaseClient) return [];

        try {
          const { data, error } = await supabaseClient
            .from('high_scores')
            .select('*')
            .order('score', { ascending: false })
            .limit(10);

          if (error) throw error;
          return data || [];
        } catch (e) {
          console.error('Error fetching high scores:', e);
          return [];
        }
      }

      async function submitHighScore(playerName, score, levelReached) {
        if (!supabaseClient) return null;

        try {
          const { data, error } = await supabaseClient
            .from('high_scores')
            .insert([
              {
                player_name: playerName.toUpperCase().trim(),
                score: score,
                level_reached: levelReached
              }
            ])
            .select()
            .single();

          if (error) throw error;
          return data;
        } catch (e) {
          console.error('Error submitting score:', e);
          return null;
        }
      }

      async function checkIfHighScore(score) {
        const scores = await fetchHighScores();
        if (scores.length < 10) return true;
        const lowestTopScore = scores[scores.length - 1]?.score || 0;
        return score > lowestTopScore;
      }

      function renderLeaderboard(scores, currentPlayerId = null) {
        const list = document.getElementById('leaderboardList');

        if (scores.length === 0) {
          list.innerHTML = '<div class="loading">NO SCORES YET</div>';
          return;
        }

        list.innerHTML = scores.map((entry, index) => `
          <div class="leaderboard-entry ${entry.id === currentPlayerId ? 'current-player' : ''}">
            <span class="rank">${index + 1}.</span>
            <span class="name">${entry.player_name}</span>
            <span class="score">${entry.score.toLocaleString()}</span>
          </div>
        `).join('');
      }

      // =====================================================
      // GAME OVER UI
      // =====================================================

      async function showGameOverScreen(finalScore, levelReached) {
        const overlay = document.getElementById('highScoreOverlay');
        const finalScoreEl = document.getElementById('finalScore');
        const levelInfoEl = document.getElementById('levelInfo');
        const newHighScoreSection = document.getElementById('newHighScoreSection');
        const playerNameInput = document.getElementById('playerName');
        const submitBtn = document.getElementById('submitScore');

        // Update display
        finalScoreEl.textContent = finalScore.toLocaleString();
        levelInfoEl.textContent = `LEVEL ${levelReached}`;

        // Show overlay
        overlay.classList.add('visible');

        // Load leaderboard
        const scores = await fetchHighScores();
        renderLeaderboard(scores);

        // Check if this is a high score
        const isHighScore = await checkIfHighScore(finalScore);

        if (isHighScore && finalScore > 0) {
          newHighScoreSection.style.display = 'block';
          playerNameInput.value = '';
          playerNameInput.focus();
          submitBtn.disabled = false;
          submitBtn.textContent = 'Submit Score';
        } else {
          newHighScoreSection.style.display = 'none';
        }
      }

      function hideGameOverScreen() {
        const overlay = document.getElementById('highScoreOverlay');
        overlay.classList.remove('visible');
      }

      // Event listeners for high score UI
      document.getElementById('submitScore').addEventListener('click', async () => {
        const playerName = document.getElementById('playerName').value.trim();
        const submitBtn = document.getElementById('submitScore');

        if (!playerName) {
          alert('Please enter your name!');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        const result = await submitHighScore(playerName, score, currentLevel);

        if (result) {
          const scores = await fetchHighScores();
          renderLeaderboard(scores, result.id);
          document.getElementById('newHighScoreSection').style.display = 'none';
        } else {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Submit Score';
          alert('Failed to submit score. Please try again.');
        }
      });

      document.getElementById('playerName').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          document.getElementById('submitScore').click();
        }
      });

      document.getElementById('playAgainBtn').addEventListener('click', () => {
        hideGameOverScreen();
        resetGame();
      });

      // =====================================================
      // GAME CONFIGURATION
      // =====================================================

      const GAME_WIDTH = 1280;
      const GAME_HEIGHT = 720;

      const canvas = document.getElementById("gameCanvas");
      canvas.width = GAME_WIDTH;
      canvas.height = GAME_HEIGHT;
      const ctx = canvas.getContext("2d");

      // =====================================================
      // RESPONSIVE SCALING
      // =====================================================

      function resizeCanvas() {
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;
        const windowRatio = windowWidth / windowHeight;
        const gameRatio = GAME_WIDTH / GAME_HEIGHT;

        if (windowRatio > gameRatio) {
          canvas.style.height = windowHeight + 'px';
          canvas.style.width = (windowHeight * gameRatio) + 'px';
        } else {
          canvas.style.width = windowWidth + 'px';
          canvas.style.height = (windowWidth / gameRatio) + 'px';
        }
      }

      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      function screenToGame(screenX, screenY) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = GAME_WIDTH / rect.width;
        const scaleY = GAME_HEIGHT / rect.height;
        return {
          x: (screenX - rect.left) * scaleX,
          y: (screenY - rect.top) * scaleY
        };
      }

      // =====================================================
      // LOAD IMAGES
      // =====================================================

      const backgroundImage = new Image();
      backgroundImage.src = "background.svg";

      const basketImage = new Image();
      basketImage.src = "basket.svg";

      const appleImage = new Image();
      appleImage.src = "apple.svg";

      const mixedAppleImage = new Image();
      mixedAppleImage.src = "greenredapple.svg";

      const greenAppleImage = new Image();
      greenAppleImage.src = "greenapple.svg";

      const goldenAppleImage = new Image();
      goldenAppleImage.src = "goldenapple.svg";

      const rottenAppleImage = new Image();
      rottenAppleImage.src = "rottenapple.svg";

      const oneUpImage = new Image();
      oneUpImage.src = "1up.svg";

      const homeScreenImage = new Image();
      homeScreenImage.src = "startscreen.svg";

      // =====================================================
      // GAME STATE
      // =====================================================

      let basket = {
        x: GAME_WIDTH / 2 - 50,
        y: GAME_HEIGHT - 80,
        width: 100,
        height: 50
      };
      let objects = [];
      let score = 0;
      let lives = 3;
      let gameOver = false;
      let gameStarted = false;
      let difficultyMultiplier = 1;
      let currentLevel = 1;
      let levelScore = 0;

      const levels = [
        {
          id: 1,
          objectImage: appleImage,
          scorePerObject: 100,
          completionScore: 20,
          difficultyMultiplier: 1,
        },
        {
          id: 2,
          objectImage: mixedAppleImage,
          scorePerObject: 500,
          completionScore: 40,
          difficultyMultiplier: 1.2,
        },
        {
          id: 3,
          objectImage: greenAppleImage,
          scorePerObject: 2000,
          completionScore: Infinity,
          difficultyMultiplier: 1.5,
        },
      ];

      // =====================================================
      // GAME OBJECTS
      // =====================================================

      function createObject() {
        const size = 56;
        const x = Math.random() * (GAME_WIDTH - size);
        const speed = (2 + Math.random() * 2) * difficultyMultiplier;

        const isOneUp = Math.random() < 0.05;
        const isGolden = !isOneUp && Math.random() < 0.08;
        const isHarmful = !isOneUp && !isGolden && Math.random() < 0.3;

        objects.push({ x, y: -size, size, speed, isHarmful, isGolden, isOneUp });
      }

      // =====================================================
      // DRAWING FUNCTIONS
      // =====================================================

      function drawBasket() {
        if (basketImage.complete) {
          ctx.drawImage(basketImage, basket.x, basket.y, basket.width, basket.height);
        }
      }

      function drawObjects() {
        objects.forEach((obj) => {
          const img = obj.isOneUp
            ? oneUpImage
            : obj.isGolden
            ? goldenAppleImage
            : obj.isHarmful
            ? rottenAppleImage
            : levels[currentLevel - 1].objectImage;

          if (img.complete) {
            ctx.drawImage(img, obj.x, obj.y, obj.size, obj.size);
          }
        });
      }

      function drawScore() {
        ctx.fillStyle = "white";
        ctx.font = "bold 28px Arial";
        ctx.textBaseline = "top";

        ctx.textAlign = "left";
        ctx.fillText(`Score: ${score.toLocaleString()}`, 24, 20);

        ctx.textAlign = "center";
        ctx.fillText(`Level ${currentLevel}`, GAME_WIDTH / 2, 20);

        ctx.textAlign = "right";
        ctx.fillText(`Lives: ${lives}`, GAME_WIDTH - 24, 20);
      }

      function drawStartScreen() {
        if (homeScreenImage.complete) {
          ctx.drawImage(homeScreenImage, 0, 0, GAME_WIDTH, GAME_HEIGHT);
        } else {
          ctx.fillStyle = "#2d5a27";
          ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

          ctx.fillStyle = "white";
          ctx.font = "bold 48px Arial";
          ctx.textAlign = "center";
          ctx.fillText("Orchard Dash", GAME_WIDTH / 2, GAME_HEIGHT / 2 - 40);

          ctx.font = "24px Arial";
          ctx.fillText("Tap or Click to Start", GAME_WIDTH / 2, GAME_HEIGHT / 2 + 20);
        }
      }

      // =====================================================
      // GAME LOGIC
      // =====================================================

      function update() {
        if (gameOver) return;

        objects.forEach((obj) => {
          obj.y += obj.speed;
          obj.speed += 0.02;
        });

        objects = objects.filter((obj) => {
          const isColliding =
            obj.y + obj.size >= basket.y &&
            obj.y <= basket.y + basket.height &&
            obj.x < basket.x + basket.width &&
            obj.x + obj.size > basket.x;

          if (isColliding) {
            if (obj.isOneUp) {
              lives++;
            } else if (obj.isHarmful) {
              lives--;
              if (lives <= 0) {
                gameOver = true;
                showGameOverScreen(score, currentLevel);
              }
            } else {
              if (obj.isGolden) {
                score += 1000000;
                levelScore += 1;
              } else {
                score += levels[currentLevel - 1].scorePerObject;
                levelScore += 1;
              }

              if (levelScore >= levels[currentLevel - 1].completionScore && currentLevel < levels.length) {
                currentLevel++;
                levelScore = 0;
                difficultyMultiplier = levels[currentLevel - 1].difficultyMultiplier;
              }
            }
            return false;
          } else if (obj.y > GAME_HEIGHT) {
            if (!obj.isHarmful && !obj.isOneUp) {
              lives--;
              if (lives <= 0) {
                gameOver = true;
                showGameOverScreen(score, currentLevel);
              }
            }
            return false;
          }
          return true;
        });

        if (Math.random() < 0.015) {
          createObject();
        }

        difficultyMultiplier += 0.00005;
      }

      function moveBasket(x, y) {
        const offsetY = 100;
        basket.x = Math.max(0, Math.min(x - basket.width / 2, GAME_WIDTH - basket.width));
        // Allow basket from 150px from top (below HUD) to 20px from bottom
        basket.y = Math.max(150, Math.min(y - offsetY - basket.height / 2, GAME_HEIGHT - basket.height - 20));
      }

      function resetGame() {
        objects = [];
        score = 0;
        lives = 3;
        gameOver = false;
        gameStarted = true;
        currentLevel = 1;
        levelScore = 0;
        difficultyMultiplier = levels[0].difficultyMultiplier;
        basket.x = GAME_WIDTH / 2 - basket.width / 2;
        basket.y = GAME_HEIGHT - 80;
        gameLoop();
      }

      // =====================================================
      // INPUT HANDLING
      // =====================================================

      canvas.addEventListener("mousemove", (e) => {
        if (!gameStarted || gameOver) return;
        const pos = screenToGame(e.clientX, e.clientY);
        moveBasket(pos.x, pos.y);
      });

      canvas.addEventListener("click", (e) => {
        if (!gameStarted) {
          gameStarted = true;
          gameLoop();
        }
      });

      canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();
        if (!gameStarted || gameOver) return;
        const touch = e.touches[0];
        const pos = screenToGame(touch.clientX, touch.clientY);
        moveBasket(pos.x, pos.y);
      }, { passive: false });

      canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        if (!gameStarted) {
          gameStarted = true;
          gameLoop();
        } else if (!gameOver) {
          const touch = e.touches[0];
          const pos = screenToGame(touch.clientX, touch.clientY);
          moveBasket(pos.x, pos.y);
        }
      }, { passive: false });

      document.addEventListener("touchmove", (e) => e.preventDefault(), { passive: false });

      // =====================================================
      // MAIN GAME LOOP
      // =====================================================

      function gameLoop() {
        ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        if (!gameStarted) {
          drawStartScreen();
          return;
        }

        if (backgroundImage.complete) {
          ctx.drawImage(backgroundImage, 0, 0, GAME_WIDTH, GAME_HEIGHT);
        }

        drawBasket();
        drawObjects();
        drawScore();
        update();

        if (!gameOver) {
          requestAnimationFrame(gameLoop);
        }
      }

      // =====================================================
      // INITIALIZATION
      // =====================================================

      homeScreenImage.onload = () => {
        drawStartScreen();
      };

      setTimeout(() => {
        if (!gameStarted) {
          drawStartScreen();
        }
      }, 500);
    </script>
  </body>
</html>
